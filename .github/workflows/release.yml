name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.3.0). Tag will be vX.Y.Z. Must match manifest.json."
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Verify version in manifests matches input
        shell: pwsh
        run: ./scripts/validate-release-metadata.ps1 -Version "${{ inputs.version }}" -SkipFeedValidation

      - name: Decode signing key
        env:
          EXTENSION_PEM: ${{ secrets.EXTENSION_PEM }}
        run: |
          if [ -z "$EXTENSION_PEM" ]; then
            echo "::error::EXTENSION_PEM secret is required for CRX signing"
            exit 1
          fi
          echo "$EXTENSION_PEM" | base64 -d > Vantage-selfhost.pem
          chmod 600 Vantage-selfhost.pem

      - name: Build Chrome ZIP
        run: |
          mkdir -p dist
          python -c "
          import zipfile, os, json
          from pathlib import Path
          src = Path('.')
          allowlist = json.loads(Path('scripts/runtime-allowlist.json').read_text())
          manifest = allowlist['chromium_manifest']
          items = [manifest] + allowlist['items']
          out = 'dist/Vantage-v${{ inputs.version }}.zip'
          with zipfile.ZipFile(out, 'w', zipfile.ZIP_DEFLATED, compresslevel=9) as zf:
              for item in items:
                  p = src / item
                  if not p.exists():
                      raise FileNotFoundError(f'Allowlisted item missing: {item}')
                  if p.is_dir():
                      for child in sorted(p.rglob('*')):
                          if child.is_file():
                              zf.write(child, child.relative_to(src).as_posix())
                  else:
                      zf.write(p, p.relative_to(src).as_posix())
          print(f'wrote {out} ({os.path.getsize(out):,} bytes)')
          "

      - name: Verify Chrome ZIP contents
        run: python scripts/verify-runtime-package.py --target chromium dist/Vantage-v${{ inputs.version }}.zip

      - name: Pack CRX
        run: |
          python scripts/build-crx.py \
            dist/Vantage-v${{ inputs.version }}.zip \
            Vantage-selfhost.pem \
            dist/Vantage-v${{ inputs.version }}.crx

      - name: Verify CRX header
        run: |
          python -c "
          import struct
          with open('dist/Vantage-v${{ inputs.version }}.crx', 'rb') as f:
              data = f.read()
          assert data[:4] == b'Cr24', 'CRX magic mismatch'
          assert struct.unpack('<I', data[4:8])[0] == 3, 'CRX version mismatch'
          hs = struct.unpack('<I', data[8:12])[0]
          assert data[12 + hs:12 + hs + 2] == b'PK', 'embedded ZIP missing'
          print('CRX OK')
          "

      - name: Build Firefox XPI
        run: |
          python -c "
          import zipfile, os, json
          from pathlib import Path
          src = Path('.')
          allowlist = json.loads(Path('scripts/runtime-allowlist.json').read_text())
          firefox_manifest = allowlist['firefox_manifest']
          items = allowlist['items']
          out = 'dist/Vantage-v${{ inputs.version }}-firefox.xpi'
          with zipfile.ZipFile(out, 'w', zipfile.ZIP_DEFLATED, compresslevel=9) as zf:
              zf.write(firefox_manifest, 'manifest.json')
              for item in items:
                  p = src / item
                  if not p.exists():
                      raise FileNotFoundError(f'Allowlisted item missing: {item}')
                  if p.is_dir():
                      for child in sorted(p.rglob('*')):
                          if child.is_file():
                              zf.write(child, child.relative_to(src).as_posix())
                  else:
                      zf.write(p, p.relative_to(src).as_posix())
          print(f'wrote {out} ({os.path.getsize(out):,} bytes)')
          "

      - name: Verify Firefox XPI contents
        run: python scripts/verify-runtime-package.py --target firefox dist/Vantage-v${{ inputs.version }}-firefox.xpi

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Build unpacked for audit
        shell: pwsh
        run: ./scripts/build-unpacked.ps1

      - name: Run accessibility audit
        run: |
          npm ci
          npx puppeteer browsers install chrome
          npm run audit -- --headless || echo "::warning::Accessibility violations found — see uploaded report"

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: accessibility-report
          path: dist/audit/
          if-no-files-found: ignore

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum \
            Vantage-v${{ inputs.version }}.zip \
            Vantage-v${{ inputs.version }}.crx \
            Vantage-v${{ inputs.version }}-firefox.xpi \
            > SHA256SUMS.txt

      - name: Generate release notes
        run: |
          python -c "
          import re
          from pathlib import Path
          version = '${{ inputs.version }}'
          changelog = Path('CHANGELOG.md')
          notes = f'## v{version}\n\nRelease build for Vantage v{version}.'
          if changelog.exists():
              src = changelog.read_text(encoding='utf-8')
              m = re.search(rf'## v{re.escape(version)}\b.*?(?=\n## v|\Z)', src, re.S)
              if m:
                  notes = m.group(0).strip()
          install = '''
          ## Install

          **Chrome / Edge / Brave / Vivaldi (Chromium):**
          1. Download **\`Vantage-v''' + version + '''.zip\`** below.
          2. Extract to a permanent folder.
          3. \`chrome://extensions\` → enable Developer mode → **Load unpacked** → pick the folder.

          The \`.crx\` is a secondary asset for Chromium forks that still accept self-signed packages.

          **Firefox (109+):**
          1. Download **\`Vantage-v''' + version + '''-firefox.xpi\`** below.
          2. Open \`about:debugging\` → **This Firefox** → **Load Temporary Add-on…** → pick the XPI.
             _(Temporary installs reset on browser restart — see README for permanent options.)_

          ## Verify integrity

          \`\`\`bash
          sha256sum -c SHA256SUMS.txt
          \`\`\`
          '''
          open('dist/release-notes.md', 'w').write(notes + '\n' + install)
          print(notes)
          "

      - name: Wipe signing key from runner
        if: always()
        run: rm -f Vantage-selfhost.pem

      - name: Tag and create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ inputs.version }}"
          git tag --list | grep -qx "$TAG" || git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file dist/release-notes.md \
            dist/Vantage-v${{ inputs.version }}.zip \
            dist/Vantage-v${{ inputs.version }}.crx \
            dist/Vantage-v${{ inputs.version }}-firefox.xpi \
            dist/SHA256SUMS.txt

      - name: Update Omaha feed + AMO update feed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          TAG="v${VERSION}"
          REPO="${{ github.repository }}"
          EXT_ID="hkfepknnglonkidihcoicdfkjkjfnejn"
          GECKO_ID="vantage@sysadmindoc"

          # Omaha CRX update feed (Chrome self-hosted policy install)
          CRX_URL="https://github.com/${REPO}/releases/download/${TAG}/Vantage-${TAG}.crx"
          HASH=$(sha256sum dist/Vantage-${TAG}.crx | awk '{print $1}')
          XPI_URL="https://github.com/${REPO}/releases/download/${TAG}/Vantage-${TAG}-firefox.xpi"
          XPI_HASH=$(sha256sum dist/Vantage-${TAG}-firefox.xpi | awk '{print $1}')
          cat > updates.xml <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <gupdate xmlns="http://www.google.com/update2/response" protocol="2.0">
            <app appid="${EXT_ID}">
              <updatecheck codebase="${CRX_URL}" version="${VERSION}" hash_sha256="${HASH}"/>
            </app>
          </gupdate>
          EOF

          # AMO-compatible update feed (Firefox unlisted/self-hosted install)
          python3 -c "
          import json
          data = {
            'addons': {
              '${GECKO_ID}': {
                'updates': [
                  {
                    'version': '${VERSION}',
                    'update_link': '${XPI_URL}',
                    'update_hash': 'sha256:${XPI_HASH}',
                    'browser_specific_settings': {
                      'gecko': { 'strict_min_version': '109.0' }
                    }
                  }
                ]
              }
            }
          }
          json.dump(data, open('firefox-updates.json', 'w'), indent=2)
          print('firefox-updates.json written')
          "

          pwsh ./scripts/validate-release-metadata.ps1 -Version "${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add updates.xml firefox-updates.json
          git diff --cached --quiet || git commit -m "chore: update Omaha + AMO feeds for ${TAG}"
          git push origin HEAD:main
