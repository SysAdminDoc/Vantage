<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="sidePanelTitle">Vantage Feeds</title>
  <link rel="icon" type="image/png" href="icons/icon48.png" />
  <link rel="stylesheet" href="src/style.css" />
  <style>
    /* Side-panel-only overrides: the panel's available width is much
       narrower than the new-tab page, so we collapse to a single
       column and tighten paddings. */
    body {
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--bg-canvas) 94%, var(--accent) 6%), var(--bg-canvas));
      margin: 0;
    }
    .sidepanel-shell {
      display: flex;
      flex-direction: column;
      gap: var(--s-4);
      padding: var(--s-4);
      min-height: 100dvh;
      box-sizing: border-box;
    }
    .sidepanel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--s-3);
      padding-bottom: var(--s-3);
      border-bottom: 1px solid var(--border-subtle);
    }
    .sidepanel-header h1 {
      margin: 0;
      font-size: var(--text-md);
      line-height: 1.2;
      color: var(--text);
      letter-spacing: 0;
    }
    .sidepanel-kicker {
      margin: var(--s-1) 0 0;
      color: var(--subtext0);
      font-size: var(--text-xs);
      line-height: 1.4;
    }
    #sidepanel-feed-mount {
      flex: 1;
      min-height: 0;
      border-radius: var(--r-3);
      padding: var(--s-4);
    }
  </style>
</head>
<body>
  <div class="sidepanel-shell">
    <header class="sidepanel-header">
      <div>
        <h1 data-i18n="sidePanelTitle">Vantage Feeds</h1>
        <p class="sidepanel-kicker" data-i18n="sidePanelKicker">News and reading list in one stream.</p>
      </div>
      <button id="sidepanel-refresh" type="button"
              class="icon-button icon-button--ghost icon-button--small"
              aria-label="Refresh feeds" title="Refresh" data-i18n-aria-label="refreshFeeds" data-i18n-title="refreshFeeds"></button>
    </header>
    <div id="sidepanel-feed-mount" class="panel" data-widget="sidepanel"></div>
    <div id="toast-host" class="toast-host" aria-live="polite" aria-atomic="false"></div>
  </div>
  <script src="src/utils/browser-shim.js"></script>
  <script type="module" src="src/sidepanel.js"></script>
</body>
</html>
