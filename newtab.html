<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Tab</title>
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>
  <div id="background-mount" class="bg" aria-hidden="true"></div>

  <main id="vantage-root" class="vantage" role="main">

    <header class="utility-bar">
      <div id="weather-mount" class="weather-mount" aria-live="polite"></div>
      <button
        id="settings-toggle"
        class="icon-button"
        type="button"
        title="Open settings"
        aria-label="Open settings"
        aria-haspopup="dialog"
        aria-expanded="false"
        data-rotate="hover"
      ></button>
    </header>

    <section class="hero" aria-label="Search and quick links">
      <div id="greeting-mount" class="greeting"></div>
      <div id="search-mount" class="search" role="search"></div>
      <div id="quicklinks-mount" class="quicklinks"></div>
    </section>

    <section class="reading" aria-label="Reading panels">
      <div id="news-mount" class="panel" data-widget="news"></div>
      <div id="rss-mount" class="panel" data-widget="rss"></div>
    </section>

    <div id="toast-host" class="toast-host" aria-live="polite"></div>
    <div id="settings-backdrop" class="settings-backdrop" hidden></div>
    <aside
      id="settings-panel"
      class="settings-panel"
      role="dialog"
      aria-modal="true"
      aria-label="Vantage settings"
      aria-hidden="true"
      tabindex="-1"
    ></aside>
  </main>

  <script type="module" src="src/main.js"></script>
</body>
</html>
