<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Tab</title>
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>
  <a href="#vantage-root" class="skip-to-main">Skip to main content</a>

  <div id="background-mount" class="bg" aria-hidden="true"></div>

  <main id="vantage-root" class="vantage" role="main">

    <header class="utility-bar">
      <a class="brand-mark" href="#vantage-root" aria-label="Vantage home">
        <span class="brand-mark__glyph" aria-hidden="true">V</span>
        <span class="brand-mark__word">Vantage</span>
      </a>
      <div class="utility-bar__status" aria-label="Local status">
        <div id="weather-mount" class="weather-mount" aria-live="polite"></div>
        <div id="airquality-mount" class="airquality-mount" aria-live="polite"></div>
        <div id="marine-mount" class="airquality-mount" aria-live="polite"></div>
        <div id="flood-mount" class="airquality-mount" aria-live="polite"></div>
        <div id="solar-radiation-mount" class="airquality-mount" aria-live="polite"></div>
        <div id="local-status-mount" class="local-status-mount" aria-live="off"></div>
      </div>
      <div class="utility-bar__actions" aria-label="Page controls">
        <button
          id="widget-picker-toggle"
          class="icon-button"
          type="button"
          title="Customize widgets"
          aria-label="Customize widgets"
          aria-haspopup="dialog"
          aria-controls="widget-picker"
          aria-expanded="false"
        ></button>
        <button
          id="layout-edit-toggle"
          class="icon-button"
          type="button"
          title="Edit layout"
          aria-label="Edit layout"
        ></button>
        <button
          id="settings-toggle"
          class="icon-button"
          type="button"
          title="Open settings"
          aria-label="Open settings"
          aria-haspopup="dialog"
          aria-expanded="false"
          data-rotate="hover"
        ></button>
      </div>
    </header>

    <div
      id="widget-picker"
      class="widget-picker"
      hidden
      role="dialog"
      aria-modal="false"
      aria-labelledby="widget-picker-title"
      aria-hidden="true"
    ></div>

    <div id="workspace-bar" class="workspace-bar" hidden aria-label="Workspaces"></div>

    <section class="hero" aria-label="Search and quick links">
      <div id="greeting-mount" class="greeting"></div>
      <div id="search-mount" class="search" role="search"></div>
      <div id="topsites-mount" class="topsites-mount"></div>
      <div id="quicklinks-mount" class="quicklinks"></div>
    </section>

    <div id="worldclock-mount" class="worldclock-mount" aria-live="off"></div>
    <div id="quote-mount" class="quote-mount" aria-live="polite"></div>

    <div id="weather-forecast-mount" class="weather-forecast-mount" aria-live="polite"></div>

    <div id="pomodoro-mount" class="pomodoro-mount"></div>

    <section class="reading" aria-label="Reading panels">
      <div id="news-mount"      class="panel" data-widget="news"></div>
      <div id="rss-mount"       class="panel" data-widget="rss"></div>
      <div id="calendar-mount"  class="panel" data-widget="calendar"></div>
      <div id="windy-mount"     class="panel panel--map" data-widget="windy"></div>
      <div id="todo-mount"      class="panel" data-widget="todo"></div>
      <div id="notes-mount"     class="panel" data-widget="notes"></div>
      <div id="bookmarks-mount" class="panel" data-widget="bookmarks"></div>
      <div id="starred-mount"   class="panel" data-widget="starred"></div>
      <div id="inbox-mount"     class="panel" data-widget="inbox"></div>
      <div id="ambient-mount"   class="panel" data-widget="ambient"></div>
      <div id="history-mount"   class="panel" data-widget="history"></div>
      <div id="crypto-mount"    class="panel" data-widget="crypto"></div>
      <div id="github-mount"    class="panel" data-widget="github"></div>
      <div id="photo-mount"     class="panel" data-widget="photo"></div>
      <div id="countdown-mount" class="panel" data-widget="countdown"></div>
      <div id="converter-mount" class="panel" data-widget="converter"></div>
      <!-- Embed mounts are created dynamically by main.js for each entry in settings.embeds -->
    </section>

    <div id="zen-shelf-mount" class="zen-shelf-mount"></div>

    <footer class="vantage-footer" aria-label="Privacy and sync status">
      <span class="vantage-footer__trust">
        <span id="trust-lock-icon" class="vantage-footer__icon" aria-hidden="true"></span>
        <span>Local-first. Private by default.</span>
      </span>
      <span class="vantage-footer__sync">
        <span>No sync. No tracking. No profile.</span>
        <span id="trust-heart-icon" class="vantage-footer__icon vantage-footer__icon--heart" aria-hidden="true"></span>
      </span>
    </footer>

    <div
      id="toast-host"
      class="toast-host"
      aria-live="polite"
      aria-atomic="false"
    ></div>
    <dialog
      id="settings-panel"
      class="settings-panel"
      closedby="any"
      aria-labelledby="settings-panel-title"
    ></dialog>
  </main>

  <script src="src/utils/browser-shim.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
